steps:
- name: 'gcr.io/cloud-builders/go'
  env: ['GOPATH=/go']
  args: ['build', '-o', 'main', 'main.go']

- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'europe-west4-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app:v1.0', '.']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-west4-docker.pkg.dev/$PROJECT_ID/my-repository/sample-app:v1.0']

- name: 'gcr.io/cloud-builders/kubectl'
  id: 'Deploy'
  args: ['-n', 'dev', 'apply', '-f', 'dev/deployment.yaml']
  env:
  - 'CLOUDSDK_COMPUTE_ZONE=europe-west4-a'
  - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'

options:
  logging: CLOUD_LOGGING_ONLY
